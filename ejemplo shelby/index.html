<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Shelby Barber</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    header {
      text-align: center;
      padding: 80px 20px;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                  url("img/fondo.jpg");
      background-size: cover;
      background-position: center;
    }

    header h1 {
      font-size: 45px;
      margin-bottom: 10px;
    }

    header p {
      color: #ccc;
      font-size: 18px;
    }

    .buttons {
      margin-top: 25px;
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 15px 30px;
      background: #eeb909;
      color: black;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .btn.ig {
      background: #E1306C;
      color: white;
    }

    .section {
      padding: 60px 20px;
      text-align: center;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
      margin-top: 30px;
    }

    .card {
      background: #1f1f1f;
      padding: 25px;
      border-radius: 15px;
      width: 260px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    /* GALERIA */
    .gallery {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      padding: 20px;
    }

    .gallery img {
      width: 280px;
      height: 350px;
      object-fit: cover;
      border-radius: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      padding-top: 50px;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.9);
    }

    .modal img {
      display: block;
      margin: auto;
      max-width: 90%;
      max-height: 80%;
      border-radius: 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #1a1a1a;
      color: #777;
    }

    /* BOTONES FLOTANTES */
    .float-btn {
      position: fixed;
      right: 20px;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: white;
      text-decoration: none;
      z-index: 1000;
    }

    .wsp {
      bottom: 90px;
      background: #25D366;
    }

    .float-btn.ig {
      bottom: 20px;
      background: #E1306C;
    }
  </style>
</head>

<body>

  <header>
    <h1>Shelby Barber</h1>
    <p>Mira nuestras redes, nuestros trabajos y reserva tu turno</p>

    <div class="buttons">
      <a class="btn" href="https://wa.me/5491138816337" target="_blank">
        Reservar por WhatsApp
      </a>

      <a class="btn ig" href="https://instagram.com/shelby.barberia_" target="_blank">
        Ver Instagram
      </a>
    </div>
  </header>

  <section class="section">
    <h2>Servicios</h2>
    <div class="cards">
      <div class="card">
        <h3>Corte</h3>
        <p>$12000</p>
      </div>
      <div class="card">
        <h3>Barba</h3>
        <p>$10000</p>
      </div>
      <div class="card">
        <h3>Corte + Barba</h3>
        <p>$15000</p>
      </div>
    </div>
  </section>

  <section class="section">
    <h2>Trabajos</h2>

    <div class="gallery">
      <img src="img/corte1.png" onclick="openModal(this.src)">
      <img src="img/corte2.png" onclick="openModal(this.src)">
      <img src="img/corte3.png" onclick="openModal(this.src)">
    </div>
  </section>

  <!-- MODAL -->
  <div id="modal" class="modal" onclick="closeModal()">
    <img id="modalImg">
  </div>

  <footer>
    <p>📍 Merlo - Buenos Aires</p>
    <p>© 2021 Shelby Barber</p>
  </footer>
  <a href="https://wa.me/5491138816337" class="float-btn wsp" target="_blank">
    💬
  </a>

  <a href="https://instagram.com/shelby.barberia_" class="float-btn ig" target="_blank">
    📸
  </a>

  <script>
    function openModal(src) {
      document.getElementById("modal").style.display = "block";
      document.getElementById("modalImg").src = src;
    }

    function closeModal() {
      document.getElementById("modal").style.display = "none";
    }
  </script>

</body>
</html>
